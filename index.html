<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#C41E3A">
    <title>SexBirdz 🔥 - Version Réparée</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root {
            --primary: #C41E3A;
            --accent: #FF4466;
            --dark: #1a0510;
            --light: #FFF0F3;
            --gold: #FFD700;
            --glow: rgba(196,30,58,0.4);
        }
        body {
            font-family: 'Josefin Sans', sans-serif;
            background: radial-gradient(ellipse at top, #8B0A1A, #1a0510);
            min-height: 100vh;
            color: var(--light);
            overflow-x: hidden;
        }
        .container { max-width:800px; margin:0 auto; padding:2rem 1rem; position:relative; z-index:1; }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size:3.5rem;
            color:var(--accent);
            text-shadow:0 0 30px var(--glow);
            text-align:center;
            margin-bottom:1rem;
        }
        .subtitle { text-align:center; color:var(--gold); opacity:0.9; margin-bottom:2rem; }
        .stats-bar {
            display:flex; justify-content:center; gap:1.5rem; margin:1.5rem 0; flex-wrap:wrap;
        }
        .stat-item {
            background:rgba(255,215,0,0.1); padding:0.8rem 1.2rem; border-radius:20px; border:1px solid var(--gold);
            text-align:center; min-width:100px;
        }
        .stat-value { font-size:2rem; font-weight:bold; color:var(--gold); }
        .btn {
            background:linear-gradient(135deg, var(--primary), var(--accent));
            color:white; border:none; padding:1.2rem 2rem; font-size:1.1rem; border-radius:50px;
            margin:1rem auto; display:block; width:80%; max-width:400px; cursor:pointer;
            box-shadow:0 4px 15px var(--glow);
        }
        .card {
            background:rgba(45,21,32,0.85); border:1px solid var(--accent); border-radius:20px;
            padding:2rem; margin:1.5rem 0; box-shadow:0 8px 30px rgba(0,0,0,0.5);
        }
        .hidden { display:none; }
    </style>
</head>
<body>

<div class="container">
    <h1>SexBirdz <span style="font-size:1.5rem;">🔥</span></h1>
    <p class="subtitle">Jeu Intime pour Couples – Version Réparée</p>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-value">42</div>
            <div>questions</div>
        </div>
        <div class="stat-item">
            <div class="stat-value">7</div>
            <div>série</div>
        </div>
        <div class="stat-item">
            <div class="stat-value">3</div>
            <div>sessions</div>
        </div>
    </div>

    <div class="card">
        <h2 style="text-align:center; color:var(--gold);">Choisis ton mode</h2>

        <button class="btn" onclick="alert('Mode Questions lancé ! (à implémenter)')">
            💬 Mode Questions
        </button>

        <button class="btn" onclick="alert('Mode Quiz lancé ! (à implémenter)')">
            🎴 Mode Quiz / Cartes Mystère
        </button>

        <button class="btn" onclick="alert('Mode Solo lancé ! (à implémenter)')">
            🔍 Mode Solo
        </button>
    </div>

    <p style="text-align:center; margin-top:2rem; opacity:0.7; font-size:0.9rem;">
        Version simplifiée – Firebase retiré temporairement pour tester<br>
        Si ça marche, on rajoute le multi-joueurs après
    </p>
</div>

<script>
// Petit debug console pour savoir si le JS tourne
console.log("SexBirdz version simplifiée chargée");
console.log("Date:", new Date().toLocaleString());
console.log("iPhone/Safari ?", navigator.userAgent.includes("iPhone") || navigator.userAgent.includes("Safari"));
</script>

</body>
</html>
